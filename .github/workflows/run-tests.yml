name: Run tests

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging
      
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Unit and integration tests
      shell: pwsh
      run: |
        Get-ChildItem -Path . -Recurse -Filter *.Tests.csproj |
          Where-Object { $_.FullName -notlike '*OpenBullet2.Native.Tests*' } |
          ForEach-Object {
            dotnet test $_.FullName
          }
